# Twitch Canvas — full stack for NAS deploy. `docker compose up` (no params)
# brings up Redis, self-hosted Convex, the WS gateway, the persistence worker,
# the static web SPA, and a Caddy TLS reverse proxy. Multi-arch (arm64 NAS +
# amd64). Config/secrets come from .env (copy .env.example -> .env). Secrets are
# never baked into images.
#
# Boot order (FEN-69): redis + convex-backend go healthy, then `convex-deploy`
# pushes the Convex functions once and exits; gateway/worker only start after
# that completes so they connect to a deployed backend.
services:
  redis:
    image: redis:7-alpine
    # AOF persistence on a durable volume (R2: survive restart, keep stream backlog).
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    env_file: [.env]
    environment:
      - INSTANCE_NAME=twitch-canvas
      - INSTANCE_SECRET=${CONVEX_INSTANCE_SECRET}
      # Public origins the browser reaches through the proxy (see infra/Caddyfile).
      - CONVEX_CLOUD_ORIGIN=${VITE_CONVEX_URL}
      - CONVEX_SITE_ORIGIN=${VITE_CONVEX_SITE_URL}
    volumes:
      - convex-data-2:/convex/data
    healthcheck:
      # The convex-backend image ships curl (matches upstream self-hosting compose);
      # it has no busybox/wget, so wget here would never go healthy.
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # One-shot: mint the self-hosted Convex admin key WITHOUT a manual terminal
  # (FEN-92). The admin key is a deterministic function of (INSTANCE_NAME,
  # INSTANCE_SECRET) — the backend validates any key minted from the same
  # INSTANCE_SECRET it runs with. So we run `generate_admin_key.sh` (baked into
  # the convex-backend image; same script the docs invoke via `docker compose
  # exec backend ./generate_admin_key.sh`) from a throwaway container that shares
  # INSTANCE_NAME + INSTANCE_SECRET with convex-backend, and write the key to a
  # shared volume for convex-deploy to consume. This removes the only manual,
  # not-yet-automated step in the bring-up: no Coolify exec / UI terminal needed.
  #
  # ALWAYS exits 0: if the key cannot be minted (script moved in a future image,
  # etc.) the stack must still come up in anonymous/bootstrap mode rather than
  # hard-failing `up` (gateway/worker gate on convex-deploy completing). A missing
  # key then degrades to "no persistence", which is observable, not a dead stack.
  # One-shot: mints the self-hosted Convex admin key from INSTANCE_SECRET without
  # any manual terminal (FEN-92). Built from infra/convex-admin-key/Dockerfile
  # (same base image as convex-backend, so generate_admin_key.sh is present).
  # Script is in infra/convex-admin-key/mint.sh — no inline block scalar, no `$$`
  # escaping hazards. Writes the key to /admin/admin_key on the convex-admin volume
  # which convex-deploy reads. ALWAYS exits 0 → degrades to anonymous on failure.
  convex-admin-key:
    build:
      context: .
      dockerfile: infra/convex-admin-key/Dockerfile
    env_file: [.env]
    environment:
      # MUST match convex-backend exactly — key is signed with the instance secret.
      - INSTANCE_NAME=twitch-canvas
      - INSTANCE_SECRET=${CONVEX_INSTANCE_SECRET}
    volumes:
      - convex-admin:/admin
    depends_on:
      convex-backend:
        condition: service_healthy
    restart: "no"

  # One-shot: deploy the Convex functions into the self-hosted backend, then seed
  # the deployment env vars they read (incl. the F8 GATEWAY_INTERNAL_* seam — see
  # apps/convex/deploy.sh), then exit. Self-hosted Convex keeps function env IN
  # the deployment, so env_file alone never reaches process.env; deploy.sh pushes
  # it. Everything that talks to Convex depends on this completing successfully.
  # Reads the admin key minted by convex-admin-key from the shared volume when no
  # CONVEX_SELF_HOSTED_ADMIN_KEY is supplied (FEN-92).
  convex-deploy:
    build:
      context: .
      dockerfile: apps/convex/Dockerfile
    env_file: [.env]
    environment:
      - CONVEX_SELF_HOSTED_URL=http://convex-backend:3210
    volumes:
      - convex-admin:/admin:ro
    depends_on:
      convex-backend:
        condition: service_healthy
      convex-admin-key:
        condition: service_completed_successfully
    restart: "no"

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    env_file: [.env]
    environment:
      - REDIS_URL=redis://redis:6379
      # F8 moderation internal seam (FEN-19): authorises Convex's POST
      # /internal/{moderate,ban,freeze,flush} calls. Unset => the seam is disabled
      # (routes answer 404); wrong/missing Bearer => 401. Also flows via env_file;
      # kept explicit so the security-sensitive wiring is auditable here.
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-}
    depends_on:
      redis:
        condition: service_healthy
      convex-backend:
        condition: service_healthy
      convex-deploy:
        condition: service_completed_successfully
    healthcheck:
      # node:22-alpine ships busybox wget. The gateway answers 200 on any GET.
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # Persistence worker (FEN-57): batch-flushes the Redis placement stream to
  # Convex (worker:* seam), writes snapshots + gallery fields, rebuilds Redis on
  # cold start. NOT on the hot path (G-A1); exposes no ports.
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: [.env]
    environment:
      - REDIS_URL=redis://redis:6379
      - CONVEX_SELF_HOSTED_URL=http://convex-backend:3210
      # ADR-0001: the worker's canvas slug MUST equal the gateway's. Both read the
      # single GATEWAY_CANVAS_ID from the shared .env, so they match by construction.
      # FEN-86: authenticates the worker to the `worker:run` Convex action that
      # fronts the now-internal worker:* / canvases:setGalleryFields seam. Same
      # secret deploy.sh already seeds into the Convex deployment for the F8
      # moderation seam. Also flows via env_file; kept explicit so the
      # security-sensitive wiring is auditable here (mirrors the gateway).
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-}
    depends_on:
      redis:
        condition: service_healthy
      convex-backend:
        condition: service_healthy
      convex-deploy:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # VITE_* are inlined at build time (public origins, not secrets).
      args:
        VITE_CONVEX_URL: ${VITE_CONVEX_URL}
        VITE_CONVEX_SITE_URL: ${VITE_CONVEX_SITE_URL}
    healthcheck:
      # node:22-alpine static server answers 200 on /healthz.
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # TLS reverse proxy. Routes /ws -> gateway, /api/auth -> convex site origin
  # (Twitch callback), /convex -> convex cloud origin, everything else -> web.
  proxy:
    # Caddyfile is BAKED into the image (infra/proxy/Dockerfile). A bind-mount of
    # ./infra/Caddyfile fails on Coolify (host-source auto-created as a dir →
    # "mount a directory onto a file", FEN-80); baking is reproducible everywhere
    # incl. the NAS. Build context = repo root so `infra/Caddyfile` resolves.
    build:
      context: .
      dockerfile: infra/proxy/Dockerfile
    environment:
      # Site address decides scheme/port inside Caddy (see infra/Caddyfile).
      # Default ':80' = reliable HTTP-only on all hosts (FEN-78 #4).
      - SITE_ADDRESS=${SITE_ADDRESS:-:80}
    # Host ports are configurable to avoid collisions with a system Caddy,
    # Supabase Kong (8443), etc. on a real host (FEN-78 #5). Container always
    # listens on 80/443; only the published host port changes.
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - gateway
      - convex-backend
    restart: unless-stopped

volumes:
  redis-data:
  convex-data-2:
  # Holds the in-stack-minted Convex admin key (FEN-92): convex-admin-key writes
  # it, convex-deploy reads it. Not a secret store the operator manages — the key
  # is re-derivable from CONVEX_INSTANCE_SECRET on every deploy.
  convex-admin:
  caddy-data:
  caddy-config:
