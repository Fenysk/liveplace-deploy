<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 32" width="180" height="32" role="img" aria-label="LivePlace">
  <!-- Wordmark = live-pixel mark + word. Display face is Press Start 2P (Arcade).
       Ship as OUTLINED paths in prod; here text uses the font with fallback so
       it stays editable. "Place" carries the coral accent. -->
  <rect y="7" width="18" height="18" rx="3" fill="#ef4d3a"/>
  <rect x="5" y="12" width="8" height="8" rx="1.5" fill="#ffffff"/>
  <text x="26" y="23" font-family="'Press Start 2P','Inter',monospace" font-size="15" font-weight="700">
    <tspan fill="#18181c">Live</tspan><tspan fill="#ef4d3a">Place</tspan>
  </text>
</svg>
