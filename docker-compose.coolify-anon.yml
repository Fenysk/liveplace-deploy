# docker-compose.coolify-anon.yml — minimal ANONYMOUS bootstrap for the public
# Coolify VPS (FEN-80). Brings up only the services the anonymous WS live-pixel
# smoke exercises: redis + gateway + web + proxy.
#
# WHY a reduced stack: the hot pixel path (place → ack → broadcast) is Redis-only
# (FEN-50); the gateway's only Convex use (the gauge bonus) degrades to 0 when
# Convex is absent; and self-hosted Convex needs a one-time, on-box admin-key mint
# (generate_admin_key.sh in the convex-backend container) that the Coolify API
# token cannot perform. So convex-backend / convex-deploy / worker are omitted
# here — they are not needed to prove the deploy + hot path on the VPS, and they
# were the source of every up/health failure. Bring the full docker-compose.yml
# online once the admin key is provisioned (then persistence + functions activate).
#
# Same images/Dockerfiles/Caddyfile as the full stack; the Caddy /convex and
# /api/auth routes simply 502 here (the smoke never hits them). Env comes from
# .env (PUBLIC_BASE_URL, SITE_ADDRESS, secrets, PROXY_HTTP/HTTPS_PORT, …).
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    env_file: [.env]
    environment:
      - REDIS_URL=redis://redis:6379
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_CONVEX_URL: ${VITE_CONVEX_URL}
        VITE_CONVEX_SITE_URL: ${VITE_CONVEX_SITE_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  proxy:
    # Caddyfile is BAKED into the image (infra/proxy/Dockerfile) — a bind-mount of
    # ./infra/Caddyfile fails on Coolify (daemon auto-creates the missing host
    # source as a dir → "mount a directory onto a file" → `up` aborts, FEN-80).
    build:
      context: .
      dockerfile: infra/proxy/Dockerfile
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-:80}
    # NO host port publishing on Coolify: its Traefik edge routes the bound domain
    # to this container's INTERNAL port 80 over the docker network. Publishing host
    # 8080/8443 is unnecessary AND conflict-prone — a prior failed deploy's
    # `restart: unless-stopped` proxy can keep holding those host ports, so the next
    # deploy's proxy fails to bind and the whole `up` fails (FEN-80). `expose`
    # documents the internal port Coolify routes to.
    expose:
      - "80"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - gateway
    restart: unless-stopped

volumes:
  redis-data:
  caddy-data:
  caddy-config:
